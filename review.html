<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>RS Home Care Reviews</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Poppins;
}

body{
background:url("bg.jpg") center/cover no-repeat fixed;
position:relative;
}

body::before{
content:"";
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
z-index:-1;
}

.wrapper{
max-width:1100px;
margin:auto;
padding:40px 20px;
}

/* Review form */

.review-box{
background:white;
padding:30px;
border-radius:14px;
box-shadow:0 12px 35px rgba(0,0,0,0.25);
max-width:420px;
margin:auto;
text-align:center;
animation:fadeUp 1s ease;
}

@keyframes fadeUp{
from{opacity:0;transform:translateY(40px);}
to{opacity:1;transform:translateY(0);}
}

.logo{
width:120px;
margin-bottom:10px;
}

h2{
margin-bottom:15px;
}

input, textarea{
width:100%;
padding:12px;
margin:10px 0;
border-radius:8px;
border:1px solid #ccc;
}

textarea{
resize:none;
}

/* word counter */

#wordCounter{
font-size:12px;
text-align:right;
color:#777;
margin-top:-5px;
}

/* stars */

.star-rating{
direction:rtl;
display:flex;
justify-content:center;
margin:10px 0;
}

.star-rating input{
display:none;
}

.star-rating label{
font-size:28px;
color:#ccc;
cursor:pointer;
transition:.2s;
}

.star-rating label:hover,
.star-rating label:hover ~ label,
.star-rating input:checked ~ label{
color:#ffc107;
transform:scale(1.1);
}

/* button */

button{
width:100%;
padding:13px;
border:none;
border-radius:8px;
background:#007bff;
color:white;
font-size:16px;
cursor:pointer;
transition:.3s;
}

button:hover{
background:#0056d2;
}

/* reviews */

.reviews-section{
margin-top:60px;
text-align:center;
color:black;
}

.reviews-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-top:30px;
}

.review-card{
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 8px 25px rgba(0,0,0,0.2);
transition:.3s;
}

.review-card:hover{
transform:translateY(-6px);
}

.review-name{
font-weight:600;
}

.review-stars{
color:#ffc107;
margin:5px 0;
}

/* footer */

.footer{
margin-top:40px;
text-align:center;
color:white;
font-size:14px;
}

.footer a{
color:#0ddfdf;
text-decoration:none;
}

/* MODERN SUCCESS POPUP */

.success-popup{
position:fixed;
inset:0;
background:rgba(0,0,0,0.45);
display:flex;
align-items:center;
justify-content:center;
opacity:0;
visibility:hidden;
transition:.35s;
z-index:5000;
}

.success-popup.show{
opacity:1;
visibility:visible;
}

.popup-card{
background:white;
padding:35px 40px;
border-radius:20px;
text-align:center;
width:90%;
max-width:360px;
box-shadow:0 30px 70px rgba(0,0,0,0.35);
animation:popupScale .35s ease;
}

@keyframes popupScale{
from{transform:scale(.85);opacity:0;}
to{transform:scale(1);opacity:1;}
}

.checkmark-circle{
width:70px;
height:70px;
margin:auto;
margin-bottom:15px;
}

.checkmark-circle svg{
width:100%;
height:100%;
stroke:#2ecc71;
stroke-width:4;
stroke-linecap:round;
stroke-linejoin:round;
}

.checkmark-circle circle{
stroke-dasharray:157;
stroke-dashoffset:157;
animation:drawCircle .6s ease forwards;
}

.checkmark-circle path{
stroke-dasharray:50;
stroke-dashoffset:50;
animation:drawCheck .4s .6s ease forwards;
}

@keyframes drawCircle{
to{stroke-dashoffset:0;}
}

@keyframes drawCheck{
to{stroke-dashoffset:0;}
}

.popup-card h3{
margin-bottom:8px;
color:#0f4c81;
}

.popup-card p{
font-size:14px;
color:#555;
}

/* loading screen */

.loading-screen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:white;
display:none;
align-items:center;
justify-content:center;
z-index:6000;
}

.loader-box{
text-align:center;
}

.loader-logo{
width:100px;
margin-bottom:20px;
}

.circle-loader{
width:60px;
height:60px;
border:5px solid #eee;
border-top:5px solid #007bff;
border-radius:50%;
animation:spin 1s linear infinite;
margin:auto;
}

@keyframes spin{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

</style>

</head>

<body>

<div class="wrapper">

<div class="review-box">

<img src="logo.png" class="logo">

<h2>Leave Your Feedback</h2>

<form id="reviewForm">

<input type="text" name="name" placeholder="Your Name" required>

<input type="tel" name="phone" placeholder="Phone Number" required>

<textarea id="feedback" name="feedback" rows="4" placeholder="Your feedback (max 250 words)" required></textarea>

<div id="wordCounter">0 / 250 words</div>

<div class="star-rating">
<input type="radio" name="rating" value="5" id="5"><label for="5">★</label>
<input type="radio" name="rating" value="4" id="4"><label for="4">★</label>
<input type="radio" name="rating" value="3" id="3"><label for="3">★</label>
<input type="radio" name="rating" value="2" id="2"><label for="2">★</label>
<input type="radio" name="rating" value="1" id="1"><label for="1">★</label>
</div>

<button type="submit">Submit Review</button>

</form>

</div>

<div class="reviews-section">

<h2>What Our Customers Say</h2>

<div class="reviews-grid" id="reviews"></div>

</div>

<div class="footer">

Need help? Contact <b>RS Home Care Team</b><br>

Phone <a href="tel:+917550052799">+91 7550052799</a><br>

Email <a href="mailto:rshomecaremaduraiofficial@gmail.com">rshomecaremaduraiofficial@gmail.com</a>

</div>

</div>

<!-- SUCCESS POPUP -->

<div class="success-popup" id="successPopup">

<div class="popup-card">

<div class="checkmark-circle">
<svg viewBox="0 0 52 52">
<circle cx="26" cy="26" r="25" fill="none"/>
<path fill="none" d="M14 27l7 7 16-16"/>
</svg>
</div>

<h3>Thank You!</h3>

<p>Your feedback has been submitted successfully.</p>

</div>

</div>

<!-- LOADING -->

<div class="loading-screen" id="loadingScreen">

<div class="loader-box">

<img src="logo.png" class="loader-logo">

<div class="circle-loader"></div>

<p>Submitting your review...</p>

</div>

</div>

<script>

const scriptURL="https://script.google.com/macros/s/AKfycbzEkIMVcB7Wbx-iJIvFTFCy-ZfYBxv2ZBlzD0DCsotPAZhMiU_QtArcLlOk_L14ppKTYw/exec";

const form=document.getElementById("reviewForm");
const popup=document.getElementById("successPopup");
const loader=document.getElementById("loadingScreen");
const feedback=document.getElementById("feedback");
const counter=document.getElementById("wordCounter");

/* word counter */

feedback.addEventListener("input",()=>{

let words=feedback.value.trim().split(/\s+/).filter(Boolean);

if(words.length>250){
words=words.slice(0,250);
feedback.value=words.join(" ");
}

counter.innerText=words.length+" / 250 words";

});

/* submit */

form.addEventListener("submit",e=>{

e.preventDefault();

if(localStorage.getItem("reviewSubmitted")){
alert("You already submitted a review.");
return;
}

loader.style.display="flex";

fetch(scriptURL,{
method:"POST",
body:new FormData(form)
})
.then(res=>{

localStorage.setItem("reviewSubmitted","true");

setTimeout(()=>{

loader.style.display="none";
popup.classList.add("show");

},1500);

setTimeout(()=>{

window.location.href="https://rshomecare.vercel.app/";

},3500);

})
.catch(()=>alert("Submission failed"));

});

/* load reviews */

fetch(scriptURL)
.then(res=>res.json())
.then(data=>{

let container=document.getElementById("reviews");

data.reverse().slice(0,8).forEach(r=>{

let stars="★".repeat(r.rating);

container.innerHTML+=`

<div class="review-card">
<div class="review-name">${r.name}</div>
<div class="review-stars">${stars}</div>
<div>${r.feedback}</div>
</div>

`;

});

});

</script>

</body>
</html>
